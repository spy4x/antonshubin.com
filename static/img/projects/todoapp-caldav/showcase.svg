  height="900"
  preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
    <![CDATA[
      .frame { opacity: 0; animation: cycle 30s infinite; }
      .frame-1 { animation-delay: 0s; }
      .frame-2 { animation-delay: 6s; }
      .frame-3 { animation-delay: 12s; }
      .frame-4 { animation-delay: 18s; }
      .frame-5 { animation-delay: 24s; }
      @keyframes cycle {
      0%, 18% { opacity: 1; }
      20%, 100% { opacity: 0; }
      }
      .caption {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      fill: #94a3b8;
      opacity: 0;
      animation: caption-cycle 30s infinite;
      }
      .caption-1 { animation-delay: 0s; }
      .caption-2 { animation-delay: 6s; }
      .caption-3 { animation-delay: 12s; }
      .caption-4 { animation-delay: 18s; }
      .caption-5 { animation-delay: 24s; }
      @keyframes caption-cycle {
      0%, 18% { opacity: 1; }
      20%, 100% { opacity: 0; }
      }
    ]]>
    </style>
    <clipPath id="browser">
