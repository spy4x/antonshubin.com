<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Wordmark logo: "Roley" in chunky display type with clapper icon -->
  <g transform="translate(0, 0)">
    <!-- clapper mark -->
    <g transform="translate(8, 18)" stroke="#1a1a1a" stroke-width="3.5"
      stroke-linejoin="round" stroke-linecap="round">
      <path d="M0 28 L60 28 L55 14 L5 14 Z" fill="#1a1a1a" />
      <path d="M5 14 L10 28 M18 14 L23 28 M31 14 L36 28 M44 14 L49 28"
        stroke="#FFCB3C" stroke-width="2.5" />
      <rect x="0" y="28" width="60" height="42" rx="4" fill="#E6324B" />
      <circle cx="18" cy="49" r="9" fill="#FFF8F0" />
      <circle cx="42" cy="49" r="9" fill="#FFF8F0" />
      <circle cx="18" cy="49" r="3" fill="#1a1a1a" />
      <circle cx="42" cy="49" r="3" fill="#1a1a1a" />
    </g>
    <!-- wordmark -->
    <text
      x="92" y="74"
      font-family="Fraunces, Georgia, serif"
      font-size="58"
      font-weight="900"
      fill="#1a1a1a"
      letter-spacing="-1.5"
    >
      Roley
    </text>
    <!-- underline squiggle -->
    <path
      d="M92 88 Q120 82 148 88 T204 88 T260 88 T316 88 T372 88"
      stroke="#7B3FE4"
      stroke-width="4"
      fill="none"
      stroke-linecap="round"
    />
  </g>
</svg>
