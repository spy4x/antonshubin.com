name: antonshubincom

networks:
  proxy:
    external: true

services:
  web:
    build: .
    container_name: ${PROJECT:-antonshubincom}-web
    restart: unless-stopped
    # Env vars for container: loaded from file at runtime
    # YAML substitution (${DOMAIN}) comes from `--env-file .env.prod` CLI flag
    env_file: .env.prod
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.${PROJECT:-antonshubincom}.loadbalancer.server.port=8000"
      - "traefik.http.routers.${PROJECT:-antonshubincom}.rule=(Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)) && !PathPrefix(`/umami/`)"
      - "traefik.http.routers.${PROJECT:-antonshubincom}.entrypoints=websecure"
      - "traefik.http.routers.${PROJECT:-antonshubincom}.tls=true"
      - "traefik.http.routers.${PROJECT:-antonshubincom}.tls.certresolver=myresolver"
      # Redirect www to non-www
      - "traefik.http.middlewares.${PROJECT:-antonshubincom}-redirect.redirectregex.regex=^https://www\\.${DOMAIN}/(.*)"
      - "traefik.http.middlewares.${PROJECT:-antonshubincom}-redirect.redirectregex.replacement=https://${DOMAIN}/$${1}"
      - "traefik.http.middlewares.${PROJECT:-antonshubincom}-redirect.redirectregex.permanent=true"
      # This is a public-facing site that we WANT to be indexed by search engines.
      # Override the default `security-headers` X-Robots-Tag deny with the
      # `allow-index` middleware defined in stacks/traefik/dynamic.yml.
      - "traefik.http.routers.${PROJECT:-antonshubincom}.middlewares=${PROJECT:-antonshubincom}-redirect,allow-index@file"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - .git/
            - _fresh/
            - node_modules/
            - "*.md"
